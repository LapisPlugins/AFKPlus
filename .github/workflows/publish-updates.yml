name: Publish Updates

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "startsWith(github.event.head_commit.message, 'Update ')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: "get env variables"
        id: "get_env_var"
        run: |
          #!/bin/bash
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          # "Update M.m.b title of update"
          COMMIT_MESSAGE_HEADER=$(echo "${COMMIT_MESSAGE}" | head -n 1)
          # M.m.b
          # Regex to extract the version number from my update title
          regex="([0-9]+\.[0-9]+\.[0-9]+?)"
          # Grab that there value
          if [[ $COMMIT_MESSAGE_HEADER =~ $regex ]]; then
            COMMIT_VER_TAG="${BASH_REMATCH[1]}"
          fi
          # Changelog
          CHANGELOG=$(tail -n +2 <<< "${COMMIT_MESSAGE}")
          # Push them to env
          echo "COMMIT_VER_TAG=${COMMIT_VER_TAG}" >> $GITHUB_ENV
          echo "COMMIT_TITLE=${COMMIT_MESSAGE_HEADER}" >>$GITHUB_ENV
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "${CHANGELOG}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "build/libs/AFKPlus-${{ env.COMMIT_VER_TAG }}.jar"
          body: ${{ env.CHANGELOG }}
          tag: ${{ env.COMMIT_VER_TAG }}
          name: ${{ env.COMMIT_TITLE }}

      - uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: TFVOdaeG
          version: ${{ env.COMMIT_VER_TAG }}
          name: ${{ env.COMMIT_TITLE }}
          loaders: '["paper", "spigot", "bukkit", "folia"]'
          game-versions: 1.21.x
          files: "build/libs/AFKPlus-${{ env.COMMIT_VER_TAG }}.jar"
          changelog: ${{ env.CHANGELOG }}